<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;background:#0a0a0c;font-family:'Raleway',sans-serif;color:#fff;overflow:hidden}
.s{position:relative;width:1080px;height:1920px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:104px 70px 78px}
.glow{position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:1150px;height:980px;z-index:0;
  background:radial-gradient(ellipse at center,rgba(150,119,248,0.16) 0%,rgba(255,72,89,0.05) 46%,transparent 70%)}
/* BIG logo */
.logo{position:relative;z-index:3;font-weight:400;font-size:98px;letter-spacing:-2.4px;color:#fff;line-height:0.9}
.logo span{font-weight:200}
.u{width:300px;height:9px;border-radius:5px;margin:18px auto 0;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483)}
.free{position:relative;z-index:3;margin-top:34px;display:inline-flex;align-items:center;gap:12px;background:rgba(0,196,131,0.14);color:#00c483;font-weight:800;font-size:29px;letter-spacing:1px;padding:14px 34px;border-radius:100px}
.mid{position:relative;z-index:3;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.head{font-weight:900;font-size:104px;line-height:1.0;letter-spacing:-3px}
.head .rb{background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.sub{margin-top:40px;font-weight:300;font-size:40px;line-height:1.4;color:#cfd3da;max-width:860px}
.sub b{font-weight:700;color:#fff}
.cta{position:relative;z-index:3;background:#00c483;color:#06231a;font-weight:800;font-size:42px;padding:25px 60px;border-radius:100px}
.qrs{position:relative;z-index:3;margin-top:42px;display:flex;gap:60px}
.qr{display:flex;flex-direction:column;align-items:center;gap:15px}
.qr .tile{width:212px;height:212px;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center}
.qr .tile img{width:180px;height:180px}
.qr .lab{font-weight:700;font-size:28px;color:#f4f5f7}.qr .lab span{display:block;font-weight:300;font-size:21px;color:#9aa0ab;margin-top:2px}
.stripe{position:absolute;left:0;bottom:0;width:100%;height:12px;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);z-index:6}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);background-size:3px 3px;opacity:0.3;z-index:5}
</style></head><body>
<div class="s"><div class="glow"></div>
  <div class="logo">Re<span>hearsal</span></div><div class="u"></div>
  <div class="free">&#9733; Free for Jaipuria students</div>
  <div class="mid"><div class="head">Every idea saved<br><span class="rb">makes you sharper.</span></div><div class="sub">Save a note. Get back an answer that sounds <b>just like you</b>.</div></div>
  <div class="cta">Download the app now</div>
  <div class="qrs">
    <div class="qr"><div class="tile"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-ios.png"></div><div class="lab">iOS<span>App Store</span></div></div>
    <div class="qr"><div class="tile"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-android.png"></div><div class="lab">Android<span>Google Play</span></div></div>
  </div>
  <div class="grain"></div><div class="stripe"></div>
</div></body></html>
