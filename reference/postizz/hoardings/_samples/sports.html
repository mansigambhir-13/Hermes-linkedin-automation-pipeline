<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;background:#060607;font-family:'Raleway',sans-serif;color:#fff;overflow:hidden}
.s{position:relative;width:1080px;height:1920px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;padding:104px 84px 80px}
.bg{position:absolute;inset:0;z-index:0;background:
  radial-gradient(900px 720px at 86% 22%,rgba(150,119,248,0.16),transparent 56%),
  radial-gradient(840px 660px at 12% 84%,rgba(0,196,131,0.14),transparent 60%)}
.top{position:relative;z-index:3}
.brand{display:inline-block}
.logo{font-weight:400;font-size:90px;letter-spacing:-2.4px;color:#fff;line-height:0.9}.logo span{font-weight:200}
.u{width:100%;height:9px;border-radius:5px;margin-top:15px;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483)}
.kick{margin-top:30px;font-weight:800;font-size:30px;letter-spacing:6px;text-transform:uppercase;color:#13e3a0}
.mid{position:relative;z-index:3}
.head{font-weight:900;font-size:200px;line-height:0.96;letter-spacing:-8px;padding-bottom:24px}
.head .rb{background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.sub{margin-top:54px;font-weight:700;font-size:38px;line-height:1.42;color:#eef0f4;max-width:912px;text-align:left}
.bot{position:relative;z-index:3;width:100%}
.qrhead{font-weight:800;font-size:46px;line-height:1.14;letter-spacing:-1px;color:#f4f5f7;margin-bottom:28px;max-width:760px}
.qrhead span{color:#13e3a0}
.qrs{display:flex;gap:28px}
.qr{display:flex;align-items:center;gap:22px;background:#101015;border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:22px 28px}
.qr img{width:196px;height:196px}.qr .l{font-weight:800;font-size:30px;color:#f4f5f7}.qr .l span{display:block;font-weight:300;font-size:22px;color:#9aa0ab}
.cta{margin-top:30px;text-align:center;background:#00c483;color:#06231a;font-weight:800;font-size:42px;padding:28px 0;border-radius:100px;box-shadow:0 20px 50px rgba(0,196,131,0.34)}
.stripe{position:absolute;left:0;bottom:0;width:100%;height:12px;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);z-index:6}
</style></head><body>
<div class="s"><div class="bg"></div>
  <div class="top"><div class="brand"><div class="logo">Re<span>hearsal</span></div><div class="u"></div></div><div class="kick">Free for Jaipuria students</div></div>
  <div class="mid"><div class="head">Save like<br><span class="rb">it counts.</span></div>
    <div class="sub">Rehearsal AI keeps everything you save and turns it into answers that sound just like you. Assignments, presentations, interviews. Everything becomes easier with Rehearsal.</div></div>
  <div class="bot">
    <div class="qrs">
      <div class="qr"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-ios-d.png"><div class="l">iOS<span>App Store</span></div></div>
      <div class="qr"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-android-d.png"><div class="l">Android<span>Google Play</span></div></div>
    </div>
    <div class="cta">Download the app now</div>
  </div>
  <div class="stripe"></div>
</div></body></html>
