<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;background:#0a0a0c;font-family:'Raleway',sans-serif;color:#fff;overflow:hidden}
.s{position:relative;width:1080px;height:1920px;display:flex;flex-direction:column;align-items:center;text-align:center;padding:96px 70px 0}
.glow{position:absolute;top:-140px;left:50%;transform:translateX(-50%);width:1150px;height:980px;z-index:0;
  background:radial-gradient(ellipse at center,rgba(150,119,248,0.16) 0%,rgba(255,72,89,0.05) 46%,transparent 70%)}
.wm{position:relative;z-index:3;font-weight:400;font-size:52px;letter-spacing:-1.2px;color:#fff}.wm span{font-weight:200}
.u{width:178px;height:6px;border-radius:3px;margin:11px auto 0;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483)}
.free{position:relative;z-index:3;margin-top:30px;display:inline-flex;align-items:center;gap:12px;background:rgba(0,196,131,0.14);color:#00c483;font-weight:800;font-size:28px;letter-spacing:1px;padding:13px 32px;border-radius:100px}
.head{position:relative;z-index:3;margin-top:58px;font-weight:900;font-size:130px;line-height:0.97;letter-spacing:-3.5px}
.head .rb{background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.sub{position:relative;z-index:3;margin-top:30px;font-weight:300;font-size:40px;color:#cfd3da}.sub b{font-weight:700;color:#fff}
/* capture flow */
.chips{position:relative;z-index:3;margin-top:66px;display:flex;gap:26px}
.chip{width:236px;height:186px;border-radius:30px;background:#141419;border:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.chip svg{width:62px;height:62px;stroke:var(--c);stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.chip .t{font-weight:700;font-size:30px;color:#f4f5f7}
.flow{position:relative;z-index:3;margin-top:30px;font-size:54px;line-height:1;color:#00c483}
.result{position:relative;z-index:3;margin-top:26px;font-weight:800;font-size:46px;letter-spacing:-0.5px;
  background:rgba(0,196,131,0.12);color:#fff;padding:22px 46px;border-radius:100px}
.result b{background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.cta{position:relative;z-index:3;margin-top:72px;background:#00c483;color:#06231a;font-weight:800;font-size:42px;padding:25px 60px;border-radius:100px}
.qrs{position:relative;z-index:3;margin-top:40px;display:flex;gap:60px}
.qr{display:flex;flex-direction:column;align-items:center;gap:15px}
.qr .tile{width:214px;height:214px;background:#fff;border-radius:28px;display:flex;align-items:center;justify-content:center}
.qr .tile img{width:182px;height:182px}
.qr .lab{font-weight:700;font-size:29px;color:#f4f5f7}.qr .lab span{display:block;font-weight:300;font-size:22px;color:#9aa0ab;margin-top:2px}
.stripe{position:absolute;left:0;bottom:0;width:100%;height:12px;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);z-index:6}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);background-size:3px 3px;opacity:0.3;z-index:5}
</style></head><body>
<div class="s"><div class="glow"></div>
  <div class="wm">Re<span>hearsal</span></div><div class="u"></div>
  <div class="free">&#9733; Free for Jaipuria students</div>
  <div class="head">You saved it.<br><span class="rb">You've got it.</span></div>
  <div class="sub">Rehearsal AI keeps <b>everything</b> you save.</div>
  <div class="chips">
    <div class="chip" style="--c:#9677f8"><svg viewBox="0 0 24 24"><rect x="9" y="2.5" width="6" height="11.5" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8.5" y1="21" x2="15.5" y2="21"/></svg><div class="t">Voice notes</div></div>
    <div class="chip" style="--c:#4e44fd"><svg viewBox="0 0 24 24"><path d="M6 2.5h8l4 4V21.5H6z"/><path d="M14 2.5v4h4"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg><div class="t">PDFs</div></div>
    <div class="chip" style="--c:#ff4859"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="8.5" cy="10" r="2"/><path d="M3 17l5-4.5 4 3.5 3-2.5 6 5"/></svg><div class="t">Photos</div></div>
  </div>
  <div class="flow">&#8595;</div>
  <div class="result">Answers that sound <b>just like you</b></div>
  <div class="cta">Download the app now</div>
  <div class="qrs">
    <div class="qr"><div class="tile"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-ios.png"></div><div class="lab">iOS<span>App Store</span></div></div>
    <div class="qr"><div class="tile"><img src="file:///Users/gourab.chatterjee/Documents/Rehearsal-content-generation-pipeline/postizz/hoardings/_samples/qr-android.png"></div><div class="lab">Android<span>Google Play</span></div></div>
  </div>
  <div class="grain"></div><div class="stripe"></div>
</div></body></html>
