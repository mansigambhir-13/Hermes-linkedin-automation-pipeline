<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;background:#0a0a0c;font-family:'Raleway',sans-serif;color:#fff;overflow:hidden}
.h{position:relative;width:1920px;height:1080px;display:flex;align-items:center;padding:0 110px}
.glow{position:absolute;right:-200px;top:50%;transform:translateY(-50%);width:1100px;height:1100px;z-index:0;
  background:radial-gradient(circle at center,rgba(0,196,131,0.16) 0%,rgba(255,72,89,0.06) 40%,transparent 68%)}
.wm{position:absolute;left:110px;top:74px;z-index:3;font-weight:400;font-size:52px;letter-spacing:-1.2px;color:#fff}
.wm span{font-weight:200}.wm .u{display:block;width:185px;height:6px;border-radius:3px;margin-top:8px;
  background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483)}
.left{position:relative;z-index:3;flex:1;max-width:1180px}
.kick{font-weight:800;font-size:34px;letter-spacing:7px;text-transform:uppercase;color:#ff4859;margin-bottom:30px}
.head{font-weight:900;font-size:188px;line-height:0.92;letter-spacing:-6px}
.head .rb{background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.sub{margin-top:40px;font-weight:300;font-size:46px;line-height:1.32;color:#d6dae1;max-width:1080px}
.sub b{font-weight:700;color:#fff}
.cta{margin-top:64px;display:inline-flex;align-items:center;gap:18px}
.pill{background:#00c483;color:#06231a;font-weight:800;font-size:38px;padding:24px 54px;border-radius:100px}
.url{font-weight:600;font-size:36px;color:#9aa0ab;letter-spacing:0.5px}
/* voice equalizer motif on the right */
.eq{position:absolute;right:150px;top:50%;transform:translateY(-50%);z-index:2;display:flex;align-items:center;gap:20px;height:560px}
.eq b{width:26px;border-radius:13px;background:var(--c)}
.stripe{position:absolute;left:0;bottom:0;width:100%;height:12px;background:linear-gradient(90deg,#9677f8,#4e44fd,#ff4859,#00c483);z-index:6}
.grain{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.02) 1px,transparent 1px);background-size:3px 3px;opacity:0.3;z-index:5;pointer-events:none}
</style></head><body>
<div class="h"><div class="glow"></div>
  <div class="wm">Re<span>hearsal</span><span class="u"></span></div>
  <div class="left">
    <div class="kick">Placement season is here</div>
    <div class="head"><span class="rb">Rehearsal</span> kiya kya?</div>
    <div class="sub">Padhna easy hai. Panel ke saamne <b>bol ke dikhana</b> — wahi asli exam hai.</div>
    <div class="cta"><span class="pill">Download the Rehearsal app</span><span class="url">tryrehearsal.ai</span></div>
  </div>
  <div class="eq">
    <b style="--c:#9677f8;height:180px"></b><b style="--c:#4e44fd;height:320px"></b>
    <b style="--c:#ff4859;height:520px"></b><b style="--c:#00c483;height:300px"></b>
    <b style="--c:#9677f8;height:430px"></b><b style="--c:#ff4859;height:150px"></b>
  </div>
  <div class="grain"></div><div class="stripe"></div>
</div></body></html>
